name: Build and deploy to App Runner

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'turbovec/**'
      - 'turbovec-python/**'
      - 'Dockerfile'
      - '.dockerignore'
      - '.cargo/**'
      - 'Cargo.toml'
      - 'Cargo.lock'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    env:
      AWS_REGION: us-east-1
      ECR_REPO: 182879431700.dkr.ecr.us-east-1.amazonaws.com/turbovec-rag
      SERVICE_ARN: arn:aws:apprunner:us-east-1:182879431700:service/turbovec-rag/9e332d0af45149dbaf6cc2f60891443a

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION \
            | docker login --username AWS --password-stdin $ECR_REPO

      - name: Build and push image
        run: |
          docker build -t $ECR_REPO:latest .
          docker push $ECR_REPO:latest

      - name: Trigger App Runner redeployment
        run: |
          STATUS=$(aws apprunner describe-service \
            --service-arn $SERVICE_ARN --region $AWS_REGION \
            --query 'Service.Status' --output text 2>/dev/null || echo "MISSING")
          if [ "$STATUS" = "RUNNING" ]; then
            aws apprunner start-deployment --service-arn $SERVICE_ARN --region $AWS_REGION
          else
            echo "Service status: $STATUS — skipping start-deployment (trigger manually once service is RUNNING)"
          fi
