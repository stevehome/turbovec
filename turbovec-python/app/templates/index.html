<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>turbovec RAG</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    body { padding: 1.5rem 0; }
    .layout { display: grid; grid-template-columns: 1fr 2fr; gap: 2rem; align-items: start; }
    .panel { border: 1px solid var(--pico-muted-border-color); border-radius: var(--pico-border-radius); padding: 1.25rem; }
    .doc-list { max-height: 280px; overflow-y: auto; font-size: 0.82rem; padding-left: 1rem; margin: 0.5rem 0 0; }
    .answer-box { min-height: 100px; padding: 0.75rem 1rem; border: 1px solid var(--pico-muted-border-color); border-radius: var(--pico-border-radius); white-space: pre-wrap; background: var(--pico-card-background-color); }
    .sources-box { font-size: 0.82rem; color: var(--pico-muted-color); margin-top: 0.5rem; }
    .sources-box p { margin: 0.25rem 0; }
    .save-ok { color: var(--pico-ins-color); font-size: 0.85rem; }
    details { margin-bottom: 0.75rem; }
    details summary { cursor: pointer; font-weight: 500; }
    .htmx-indicator { opacity: 0; }
    .htmx-request .htmx-indicator { opacity: 1; }
    #ask-btn[aria-busy="true"] { pointer-events: none; }
    #ctx-modal { max-width: 680px; width: 90vw; }
    #ctx-modal article { max-height: 70vh; overflow-y: auto; white-space: pre-wrap; font-size: 0.85rem; }
    .ctx-before, .ctx-after { color: var(--pico-muted-color); }
    .ctx-chunk { background: var(--pico-mark-background-color); color: var(--pico-mark-color); }
    .view-btn { font-size: 0.72rem; padding: 0 0.4rem; margin-left: 0.4rem; vertical-align: middle; }
  </style>
</head>
<body>
<main class="container">
  <hgroup>
    <h1>turbovec RAG</h1>
    <p>Local vector search + Claude — fully private, when run locally on a macbook</p>
  </hgroup>

  <div class="layout">

    <!-- Left: corpus management -->
    <aside class="panel">
      <h2>Corpus</h2>

      <div id="doc-list" hx-get="/documents" hx-trigger="load">
        <small>Loading…</small>
      </div>

      <hr>

      <details>
        <summary>Manage corpus</summary>

      <details>
        <summary>Add text</summary>
        <form hx-post="/documents"
              hx-target="#doc-list"
              hx-swap="outerHTML"
              hx-on::after-request="this.reset()">
          <textarea name="text"
                    placeholder="Paste any text — it will be chunked automatically…"
                    rows="4"
                    style="margin-bottom:0.5rem"></textarea>
          <button type="submit">Add to index</button>
        </form>
      </details>

      <details>
        <summary>Upload .txt file</summary>
        <form hx-post="/upload"
              hx-target="#doc-list"
              hx-swap="outerHTML"
              hx-encoding="multipart/form-data">
          <input type="file" name="file" accept=".txt,.pdf" style="margin-bottom:0.5rem">
          <button type="submit">Upload</button>
        </form>
      </details>

      <form hx-post="/reindex" hx-target="#doc-list" hx-swap="outerHTML"
            hx-confirm="Re-index corpus.txt? Existing corpus chunks will be replaced."
            style="margin-bottom:0.5rem">
        <button type="submit" class="secondary outline">Re-index corpus.txt</button>
      </form>

      <details style="margin-bottom:0.5rem">
        <summary style="cursor:pointer;font-weight:500">Chunk settings</summary>
        <form hx-post="/rechunk" hx-target="#doc-list" hx-swap="outerHTML"
              hx-confirm="Re-chunk all sources with new settings?"
              style="margin-top:0.5rem">
          <div role="group" style="margin-bottom:0.5rem">
            <input type="number" name="chunk_size" value="500" min="50" max="2000"
                   placeholder="Chunk size" style="width:50%">
            <input type="number" name="chunk_overlap" value="50" min="0" max="500"
                   placeholder="Overlap" style="width:50%">
          </div>
          <label style="font-size:0.85rem;display:flex;align-items:center;gap:0.5rem;margin-bottom:0.5rem">
            <input type="checkbox" name="contextual" value="1" style="margin:0">
            Contextual enrichment (uses Claude, slower)
          </label>
          <button type="submit" class="secondary outline">Apply &amp; Re-chunk all</button>
        </form>
      </details>
      <details style="margin-bottom:0.5rem">
        <summary style="cursor:pointer;font-weight:500">Compression</summary>
        <form hx-post="/rebuild" hx-target="#doc-list" hx-swap="outerHTML"
              hx-confirm="Rebuild index at new bit-width? All vectors will be re-quantized."
              style="margin-top:0.5rem">
          <select name="bit_width" style="margin-bottom:0.5rem">
            <option value="4">4-bit (~8x vs FP32, best recall)</option>
            <option value="3">3-bit (~10x vs FP32, good recall)</option>
            <option value="2">2-bit (~16x vs FP32, lower recall)</option>
          </select>
          <button type="submit" class="secondary outline">Rebuild index</button>
        </form>
      </details>

      <div role="group" style="margin-bottom:0.5rem">
        <form hx-post="/save" hx-target="#save-status" hx-swap="innerHTML" style="margin:0">
          <button type="submit" class="secondary outline">Save index to disk</button>
        </form>
        <form hx-post="/clear" hx-target="#doc-list" hx-swap="outerHTML"
              hx-confirm="Clear the entire index? This cannot be undone." style="margin:0">
          <button type="submit" class="contrast outline">Clear index</button>
        </form>
      </div>
      <div id="save-status" style="margin-top:0.4rem;min-height:1.2rem"></div>

      </details><!-- /Manage corpus -->
    </aside>

    <!-- Right: query + streaming answer -->
    <section class="panel">
      <h2>Query</h2>

      <div role="group" style="margin-bottom:0.5rem">
        <input type="text"
               id="question"
               placeholder="e.g. How does Rust guarantee memory safety?"
               autofocus>
        <button id="ask-btn" onclick="ask()">Ask</button>
      </div>
      <label style="font-size:0.82rem;color:var(--pico-muted-color);margin-bottom:0.25rem;display:block">
        Filter by source <small>(none = all)</small>
      </label>
      <select id="source-filter" multiple size="4" style="margin-bottom:0.5rem;font-size:0.82rem">
      </select>
      <div style="margin-bottom:1rem;font-size:0.85rem;color:var(--pico-muted-color)">
        <label style="display:flex;align-items:center;gap:0.75rem;margin:0">
          Sources (k)
          <input type="range" id="k-slider" min="1" max="10" value="3"
                 style="flex:1;margin:0" oninput="document.getElementById('k-val').textContent=this.value">
          <span id="k-val">3</span>
        </label>
      </div>

      <h3>Answer</h3>
      <div class="answer-box" id="answer"><em style="color:var(--pico-muted-color)">Answer will appear here…</em></div>

      <h3>Sources</h3>
      <div class="sources-box" id="sources"><em style="color:var(--pico-muted-color)">Retrieved passages will appear here…</em></div>
    </section>

  </div>
</main>

<dialog id="ctx-modal">
  <article>
    <header style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem">
      <strong id="ctx-title" style="font-size:0.9rem"></strong>
      <button class="secondary outline" style="padding:0 0.5rem;margin:0"
              onclick="document.getElementById('ctx-modal').close()">×</button>
    </header>
    <div id="ctx-body"></div>
  </article>
</dialog>

<script>
async function showContext(source, chunkIndex) {
  const modal = document.getElementById('ctx-modal');
  const title = document.getElementById('ctx-title');
  const body  = document.getElementById('ctx-body');
  title.textContent = `${source} #${chunkIndex + 1}`;
  body.textContent  = 'Loading…';
  modal.showModal();
  try {
    const r = await fetch(`/sources/${encodeURIComponent(source)}/context?chunk_index=${chunkIndex}&window=500`);
    if (!r.ok) { body.textContent = 'Context not available.'; return; }
    const d = await r.json();
    body.innerHTML =
      (d.truncated_start ? '<span class="ctx-before">…</span>' : '') +
      `<span class="ctx-before">${escHtml(d.before)}</span>` +
      `<mark class="ctx-chunk">${escHtml(d.chunk)}</mark>` +
      `<span class="ctx-after">${escHtml(d.after)}</span>` +
      (d.truncated_end ? '<span class="ctx-after">…</span>' : '');
  } catch { body.textContent = 'Failed to load context.'; }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function ask() {
  const question = document.getElementById('question').value.trim();
  if (!question) return;

  const answerEl  = document.getElementById('answer');
  const sourcesEl = document.getElementById('sources');
  const btn       = document.getElementById('ask-btn');

  answerEl.textContent  = '';
  sourcesEl.innerHTML   = '';
  btn.setAttribute('aria-busy', 'true');
  btn.textContent = 'Thinking…';

  try {
    const response = await fetch('/query', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({question, k: parseInt(document.getElementById('k-slider').value), filter_sources: Array.from(document.getElementById('source-filter').selectedOptions).map(o => o.value)}),
    });

    if (!response.ok) {
      answerEl.textContent = 'Request failed.';
      return;
    }

    const reader  = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer    = '';

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, {stream: true});

      // Process every complete newline-delimited JSON message.
      const lines = buffer.split('\n');
      buffer = lines.pop(); // keep any incomplete trailing fragment

      for (const line of lines) {
        if (!line.trim()) continue;
        let msg;
        try { msg = JSON.parse(line); } catch { continue; }

        if (msg.type === 'sources') {
          const topScore = msg.data.length ? msg.data[0].score : 1;
          const warning = topScore < 0.4
            ? `<p style="color:var(--pico-del-color)">⚠ Low confidence (${topScore}) — answer may not be grounded in the corpus.</p>`
            : '';
          sourcesEl.innerHTML = warning + msg.data.map(s => {
            const label = `${s.source} #${s.chunk + 1}`;
            const score = `<span style="color:var(--pico-muted-color);font-weight:normal"> · ${s.score}</span>`;
            const preview = s.text.length > 160 ? s.text.slice(0, 160) + '…' : s.text;
            const viewBtn = `<button class="secondary outline view-btn"
              onclick='showContext(${JSON.stringify(s.source)}, ${s.chunk})'>view ↗</button>`;
            return `<p><strong>${label}${score}${viewBtn}</strong><br><span>${preview}</span></p>`;
          }).join('');
        } else if (msg.type === 'token') {
          answerEl.textContent += msg.data;
        }
      }
    }
  } finally {
    btn.removeAttribute('aria-busy');
    btn.textContent = 'Ask';
  }
}

document.getElementById('question').addEventListener('keydown', e => {
  if (e.key === 'Enter') ask();
});
</script>
</body>
</html>
